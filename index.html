<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardiac CRM Toolkit — Grand Line Navigation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5ead0;
  --gold:#e8c059;
  --gold-hi:#f8db7e;
  --wax:#d9683f;
  --ink:#0b2230;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
html{background:#06141d;}
body{
  font-family:'Spectral',Georgia,serif;
  color:var(--cream);
  min-height:100%;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  padding:48px clamp(28px,8vw,118px);
  position:relative;overflow-x:hidden;
  background:url("assets/wallpaperflare.com_wallpaper.jpg") center center / cover no-repeat fixed, #06141d;
}
/* contrast scrim: dark on the left fading toward the ship on the right + bottom grounding */
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    linear-gradient(102deg, rgba(5,17,25,.90) 0%, rgba(5,17,25,.66) 32%, rgba(5,17,25,.20) 56%, rgba(5,17,25,0) 74%),
    linear-gradient(0deg, rgba(5,17,25,.55) 0%, rgba(5,17,25,0) 30%);
}

/* ===== HEADER ===== */
.stage{position:relative;z-index:2;display:block;text-align:left;width:100%;max-width:560px;}

.compass{position:relative;width:84px;height:84px;margin-bottom:22px;}
.compass .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--gold);
  box-shadow:0 0 0 5px rgba(232,192,89,.16), inset 0 0 22px rgba(0,0,0,.5), 0 8px 22px rgba(0,0,0,.45);
  background:radial-gradient(circle at 38% 32%, #1a4b5f, #06212c);}
.compass .card-pt{position:absolute;top:50%;left:50%;font:600 10px 'Cinzel',serif;color:var(--gold-hi);transform:translate(-50%,-50%);letter-spacing:.5px;}
.compass .n{top:8px;}.compass .s{top:auto;bottom:8px;}
.compass .e{left:auto;right:8px;}.compass .w{left:8px;}
.star4{position:absolute;top:50%;left:50%;width:50px;height:50px;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,var(--gold-hi),var(--gold));
  clip-path:polygon(50% 0,59% 41%,100% 50%,59% 59%,50% 100%,41% 59%,0 50%,41% 41%);
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));animation:sway 6s ease-in-out infinite;transform-origin:center;}
.star4::after{content:"";position:absolute;top:50%;left:50%;width:30px;height:30px;transform:translate(-50%,-50%) rotate(45deg);
  background:linear-gradient(135deg,#fff3cf,var(--gold-hi));
  clip-path:polygon(50% 0,59% 41%,100% 50%,59% 59%,50% 100%,41% 59%,0 50%,41% 41%);opacity:.85;}
@keyframes sway{0%,100%{transform:translate(-50%,-50%) rotate(-6deg)}50%{transform:translate(-50%,-50%) rotate(6deg)}}

.eyebrow{display:flex;align-items:center;gap:14px;color:var(--gold);font:600 13px 'Cinzel',serif;letter-spacing:.32em;text-transform:uppercase;margin-bottom:16px;text-shadow:0 1px 6px rgba(0,0,0,.6);}
.eyebrow::after{content:"";width:64px;height:3px;border-radius:2px;background:repeating-linear-gradient(45deg,var(--gold) 0 5px,#9a7320 5px 10px);box-shadow:0 1px 4px rgba(0,0,0,.5);}

h1{font-family:'Pirata One',cursive;font-weight:400;line-height:1.12;letter-spacing:.5px;
  font-size:clamp(46px,8.4vw,98px);
  color:var(--cream);
  text-shadow:0 2px 2px rgba(0,0,0,.55), 0 6px 26px rgba(0,0,0,.6);
  margin-bottom:38px;}

.rope{width:min(420px,90%);height:7px;border-radius:4px;margin-bottom:40px;
  background:repeating-linear-gradient(60deg,#d8b865 0 8px,#9a7320 8px 16px);
  box-shadow:0 2px 8px rgba(0,0,0,.5);position:relative;}
.rope::before,.rope::after{content:"";position:absolute;top:50%;width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,var(--gold-hi),#7e5f2c);transform:translateY(-50%);box-shadow:0 1px 4px rgba(0,0,0,.55);}
.rope::before{left:-7px;}.rope::after{right:-7px;}

/* ===== BUTTONS (frosted glass over the painting) ===== */
.actions{display:flex;flex-direction:column;gap:16px;width:100%;max-width:420px;}
.btn-sail{
  display:flex;align-items:center;gap:16px;
  text-decoration:none;color:var(--cream);
  background:rgba(7,26,36,.66);
  -webkit-backdrop-filter:blur(9px) saturate(1.1);backdrop-filter:blur(9px) saturate(1.1);
  border:1.5px solid rgba(232,192,89,.55);border-radius:11px;
  padding:17px 22px;
  box-shadow:0 12px 28px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.12);
  transition:transform .22s cubic-bezier(.2,.8,.2,1), box-shadow .22s, background .25s, color .25s, border-color .25s;
}
.btn-sail:hover{transform:translateY(-5px);background:linear-gradient(180deg,var(--gold-hi),var(--gold));color:#1a1206;border-color:#fff4d6;
  box-shadow:0 18px 34px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.4);}
.btn-sail:active{transform:translateY(-1px);}

.b-icon{flex-shrink:0;position:relative;width:46px;height:46px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#19495c,#06212c);
  border:1.5px solid var(--gold);box-shadow:inset 0 0 12px rgba(0,0,0,.5);}
.btn-sail:hover .b-icon{border-color:#fff3cf;}
.b-icon .star4{width:30px;height:30px;animation:none;}
.b-icon .star4::after{width:17px;height:17px;}
.anchor{position:absolute;top:50%;left:50%;width:22px;height:26px;transform:translate(-50%,-46%);}
.anchor i{position:absolute;left:50%;top:0;width:3px;height:20px;background:var(--gold-hi);transform:translateX(-50%);border-radius:2px;}
.anchor .ball{position:absolute;left:50%;top:-2px;width:8px;height:8px;border:2.5px solid var(--gold-hi);border-radius:50%;transform:translateX(-50%);}
.anchor .bar{position:absolute;left:50%;top:6px;width:16px;height:3px;background:var(--gold-hi);transform:translateX(-50%);border-radius:2px;}
.anchor .arc{position:absolute;left:50%;bottom:0;width:20px;height:12px;border:3px solid var(--gold-hi);border-top:none;border-radius:0 0 20px 20px;transform:translateX(-50%);}

.b-text{display:flex;flex-direction:column;align-items:flex-start;gap:2px;flex:1;text-align:left;}
.b-kicker{font:600 10px 'Cinzel',serif;letter-spacing:.24em;text-transform:uppercase;opacity:.78;}
.b-title{font:700 17px 'Cinzel',serif;letter-spacing:.02em;line-height:1.1;}
.b-arrow{flex-shrink:0;font-size:17px;transition:transform .22s;}
.btn-sail:hover .b-arrow{transform:translateX(4px);}

@media (max-width:720px){
  body{align-items:stretch;text-align:center;}
  body::before{background:linear-gradient(0deg, rgba(5,17,25,.7), rgba(5,17,25,.45));}
  .stage{margin-left:auto;margin-right:auto;text-align:center;}
  .compass{margin-left:auto;margin-right:auto;}
  .eyebrow{justify-content:center;}
  .rope{margin-left:auto;margin-right:auto;}
  .actions{margin-left:auto;margin-right:auto;}
  .eyebrow::before{content:"";width:64px;height:3px;border-radius:2px;background:repeating-linear-gradient(45deg,var(--gold) 0 5px,#9a7320 5px 10px);box-shadow:0 1px 4px rgba(0,0,0,.5);}
}
@media (prefers-reduced-motion:reduce){.star4{animation:none !important;}}
</style>
</head>
<body>

<main class="stage">

  <div class="compass" aria-hidden="true">
    <div class="ring"></div>
    <span class="card-pt n">N</span>
    <span class="card-pt e">E</span>
    <span class="card-pt s">S</span>
    <span class="card-pt w">W</span>
    <div class="star4"></div>
  </div>

  <div class="eyebrow">Grand Line Navigation</div>

  <h1>Cardiac CRM<br>Toolkit</h1>

  <div class="rope" aria-hidden="true"></div>

  <nav class="actions">

    <a class="btn-sail" href="app/CRM_Report_Generator.html">
      <span class="b-icon"><span class="anchor"><i></i><span class="ball"></span><span class="bar"></span><span class="arc"></span></span></span>
      <span class="b-text">
        <span class="b-kicker">The Flagship</span>
        <span class="b-title">CRM Report Generator</span>
      </span>
      <span class="b-arrow">&#9658;</span>
    </a>

  </nav>

</main>

</body>
</html>
