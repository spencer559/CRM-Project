<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Sign-in bounce target — the site's shared front door. This page sits behind its own
     Access application ("Sign in", path auth/signin.html) whose policy must include EVERY
     group that can use any tool (Developers + Device Techs + future groups).
     After Access authenticates the visitor and lands them here, this page pre-warms the
     per-application sessions: hidden iframes to each tool's probe file let Access run its
     silent redirect chain (page -> team domain -> back) and mint that app's cookie for
     authorized accounts. Once both settle (or ~4s), it returns to the index, whose probes
     then light the right cards instantly. connect-src/frame-src are the only egress and are
     limited to this origin + the Access team domain. No tool data is touched here. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src 'self'; frame-src 'self' https://*.cloudflareaccess.com; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<noscript><meta http-equiv="refresh" content="0;url=../index.html"></noscript>
<title>Signing in</title>
<style>
  body{background:#0f151b;color:#93a1ad;font-family:system-ui,sans-serif;
       display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-size:15px;}
  .pulse{animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
</style>
</head>
<body><span class="pulse">Signing you in&hellip;</span>
<script>
(function () {
  var PROBES = ['../dev/auth-check.json', '../app/crm-auth-check.json'];
  var deadline = Date.now() + 4000;
  var pending = PROBES.length, done = false;
  function go() { if (!done) { done = true; location.replace('../index.html'); } }
  function check(p) {
    return fetch(p, { redirect: 'manual', cache: 'no-store' })
      .then(function (r) { return !!r.ok; }).catch(function () { return false; });
  }
  PROBES.forEach(function (p) {
    var f = document.createElement('iframe');
    f.src = p; f.style.display = 'none';
    f.setAttribute('aria-hidden', 'true'); f.setAttribute('tabindex', '-1');
    document.body.appendChild(f);
    (function poll() {
      check(p).then(function (ok) {
        if (ok || Date.now() > deadline) { if (--pending === 0) go(); }
        else setTimeout(poll, 350);
      });
    })();
  });
  setTimeout(go, 4500);   // absolute failsafe
})();
</script>
</body>
</html>
